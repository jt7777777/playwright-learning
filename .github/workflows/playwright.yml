name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Playwright dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Checkout RWA
        uses: actions/checkout@v4
        with:
          repository: cypress-io/cypress-realworld-app
          ref: 39fc97d
          path: cypress-realworld-app

      - name: Install RWA dependencies
        working-directory: cypress-realworld-app
        run: yarn install --frozen-lockfile

      - name: Run Playwright tests
        # TODO: zmeniť na `npx playwright test` keď pribudnú autentifikované testy
        run: npx playwright test --project=login
        env:
          CI: true
          BASE_URL: http://localhost:3000
          USER_NAME: Heath93
          USER_PASSWORD: s3cret

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
