steps:
  - checkout: self
    displayName: 'Checkout repository'

  - task: NodeTool@0
    displayName: 'Setup Node.js 20'
    inputs:
      versionSpec: '20.x'

  - script: corepack enable
    displayName: 'Enable Corepack (yarn)'

  - script: npm ci
    displayName: 'Install Playwright dependencies'

  - script: npx playwright install --with-deps chromium
    displayName: 'Install Playwright browsers'

  # rm -rf je nutné pre self-hosted agentov – workspace sa recykluje medzi behmi
  # a git clone zlyhá ak adresár už existuje.
  # --depth 1 + fetch stiahne len jeden konkrétny commit namiesto celej histórie.
  - script: |
      rm -rf cypress-realworld-app
      git clone --depth 1 https://github.com/cypress-io/cypress-realworld-app.git cypress-realworld-app
      cd cypress-realworld-app
      git fetch --depth 1 origin $(RWA_COMMIT)
      git checkout FETCH_HEAD
    displayName: 'Checkout RWA'

  - script: yarn install --frozen-lockfile
    displayName: 'Install RWA dependencies'
    workingDirectory: cypress-realworld-app
